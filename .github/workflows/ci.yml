name: CI
on:
  workflow_dispatch:
  pull_request:
  push:
    branches: [main]

permissions: {}

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash

jobs:
  check:
    name: Check
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          fetch-depth: 1

      - name: Check pin placeholders
        # SHA pin 検証は他の third-party action より前に走らせ、unpinned action の実行を防ぐ。
        # check-pins.sh は plain Bash で deps 不要のため Setup Bun より前に置ける。
        run: |
          set -euo pipefail
          bash scripts/check-pins.sh

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: 1.3.14

      - name: Install dependencies
        run: |
          set -euo pipefail
          bun install --frozen-lockfile --ignore-scripts

      - name: actionlint
        uses: raven-actions/actionlint@3d39aea434753780c3b3d4a1a31c854b4dbf49d7 # v2.2.0
        with:
          version: 1.7.12
          shellcheck: false
          pyflakes: false
          cache: false

      - name: zizmor (pedantic)
        uses: zizmorcore/zizmor-action@192e21d79ab29983730a13d1382995c2307fbcaa # v0.5.7
        with:
          version: 1.26.1
          persona: pedantic
          advanced-security: false
          online-audits: false

      - name: App check (lint:code / typecheck / test)
        run: bun run check
